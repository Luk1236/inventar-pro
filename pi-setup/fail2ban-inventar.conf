# fail2ban Filter für Inventar Pro Dashboard
# Installation auf dem Pi:
#   sudo cp fail2ban-inventar.conf /etc/fail2ban/filter.d/inventar.conf
#   sudo cp fail2ban-jail.local /etc/fail2ban/jail.d/inventar.local
#   sudo systemctl restart fail2ban
#
# Status prüfen: sudo fail2ban-client status inventar

[Definition]
# Matcht "Fehlgeschlagener Login von IP <HOST>" aus dem Dashboard-Log
failregex = ^.*Fehlgeschlagener Login von IP <HOST>.*$
            ^.*Nicht erlaubter Shell-Befehl von IP <HOST>.*$
ignoreregex =
